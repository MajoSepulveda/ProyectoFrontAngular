<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold">Gesti&oacute;n de Barrios</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">Nuevo Barrio</button>
  </div>

  <div class="overflow-x-auto">
    <table mat-table [dataSource]="barrios" class="w-full">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let b">{{ b.name }}</td>
      </ng-container>

      <ng-container matColumnDef="comuna">
        <th mat-header-cell *matHeaderCellDef>Comuna</th>
        <td mat-cell *matCellDef="let b">{{ getComunaName(b.id_commune) }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let b">{{ b.status }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let b">
          <button mat-icon-button color="primary" (click)="openDialog(b)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(b.id_neighborhood!)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['name', 'comuna', 'status', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['name', 'comuna', 'status', 'actions']"></tr>
    </table>

    <div *ngIf="barrios.length === 0" class="text-center py-8 text-gray-500">
      No hay barrios registrados
    </div>
  </div>
</div>

<mat-dialog-content *ngIf="isDialogOpen">
  <h2 class="text-lg font-semibold mb-4">{{ dialogTitle }}</h2>
  <div class="flex flex-col gap-4">
    <mat-form-field>
      <mat-label>Comuna</mat-label>
      <mat-select [(ngModel)]="form.id_commune">
        <mat-option *ngFor="let c of comunas" [value]="c.id_commune">{{ c.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Nombre del barrio</mat-label>
      <input matInput [(ngModel)]="form.name" placeholder="Ej: El Poblado" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Estado</mat-label>
      <mat-select [(ngModel)]="form.status">
        <mat-option value="activa">Activa</mat-option>
        <mat-option value="inactiva">Inactiva</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
  <div class="flex justify-end gap-3 mt-4">
    <button mat-stroked-button (click)="closeDialog()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="save()">Guardar</button>
  </div>
</mat-dialog-content>
