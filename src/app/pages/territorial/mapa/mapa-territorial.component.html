<div class="flex h-[calc(100vh-120px)] gap-0">
  <aside class="w-80 bg-white shadow-md p-4 overflow-y-auto flex flex-col gap-4">
    <h2 class="text-lg font-semibold">Panel Territorial</h2>

    <mat-form-field>
      <mat-label>Comuna</mat-label>
      <mat-select [(ngModel)]="selectedCommuneId" (selectionChange)="onCommuneChange()">
        <mat-option [value]="-1">Todas las comunas</mat-option>
        <mat-option *ngFor="let c of communes" [value]="c.id_commune">{{ c.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div *ngIf="neighborhoods.length > 0">
      <h3 class="text-sm font-medium text-gray-600 mb-2">Barrios</h3>
      <mat-nav-list>
        <mat-list-item
          *ngFor="let n of neighborhoods"
          (click)="selectNeighborhood(n)"
          [class.bg-blue-100]="selectedNeighborhood?.id_neighborhood === n.id_neighborhood"
          class="rounded-md cursor-pointer mb-1 border border-gray-200 hover:bg-gray-50"
        >
          <span matListItemTitle>{{ n.name }}</span>
        </mat-list-item>
      </mat-nav-list>
    </div>
  </aside>

  <main class="flex-1 relative">
    <div #mapContainer class="w-full h-full"></div>
  </main>

  <aside *ngIf="selectedNeighborhood" class="w-80 bg-white shadow-md p-4 overflow-y-auto flex flex-col gap-4">
    <h2 class="text-lg font-semibold">{{ selectedNeighborhood.name }}</h2>

    <button
      mat-flat-button
      color="primary"
      (click)="enableAdding()"
      [disabled]="polygonLocked && !addingEnabled"
      class="w-full"
    >
      Agregar Puntos
    </button>
    <p class="text-xs text-gray-500 -mt-2">Haz click en el mapa</p>

    <button
      mat-stroked-button
      class="w-full"
      disabled
    >
      Editar Polígono
    </button>

    <button
      mat-stroked-button
      color="warn"
      (click)="clearAll()"
      class="w-full"
    >
      Limpiar
    </button>

    <div *ngIf="points.length > 0" class="flex flex-col gap-2">
      <h3 class="text-sm font-medium text-gray-600">Coordenadas</h3>
      <div class="max-h-48 overflow-y-auto border rounded-md">
        <table class="w-full text-xs">
          <thead class="bg-gray-50 sticky top-0">
            <tr>
              <th class="text-left px-2 py-1 font-medium text-gray-600">#</th>
              <th class="text-left px-2 py-1 font-medium text-gray-600">Latitud</th>
              <th class="text-left px-2 py-1 font-medium text-gray-600">Longitud</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of points; let i = index" class="border-t border-gray-100">
              <td class="px-2 py-1 font-mono">{{ i + 1 }}</td>
              <td class="px-2 py-1 font-mono">{{ p.lat | number:'1.6-6' }}</td>
              <td class="px-2 py-1 font-mono">{{ p.lng | number:'1.6-6' }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="flex gap-2 mt-auto pt-4 border-t">
      <button
        mat-stroked-button
        (click)="cancelEditing()"
        class="flex-1"
      >
        Cancelar
      </button>
      <button
        mat-flat-button
        color="primary"
        (click)="savePolygon()"
        [disabled]="points.length < 3"
        class="flex-1"
      >
        Guardar Polígono
      </button>
    </div>

    <div *ngIf="polygonLocked && points.length >= 3" class="p-3 bg-green-50 border border-green-200 rounded-md text-sm text-green-700">
      Polígono guardado exitosamente
    </div>
  </aside>
</div>
