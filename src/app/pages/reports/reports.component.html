<div class="reports-layout">
	<section class="visual-zone">
		<mat-card class="visual-card error-state" *ngIf="error; else chartState">
			<p class="message error">{{ error }}</p>
		</mat-card>

		<ng-template #chartState>
			<mat-card class="visual-card empty-state" *ngIf="!response && !loading; else chartContent">
				<p>Envía una consulta para ver el resultado en una gráfica.</p>
			</mat-card>
		</ng-template>

		<ng-template #chartContent>
			<section class="chart-area" *ngIf="response as chartResponse">
				<ng-container [ngSwitch]="chartResponse.type">
					<app-pie-chart *ngSwitchCase="'pie'" [chartData]="asPie(chartResponse)"></app-pie-chart>
					<app-bar-chart *ngSwitchCase="'bar'" [chartData]="asBar(chartResponse)"></app-bar-chart>
					<app-line-chart *ngSwitchCase="'line'" [chartData]="asLine(chartResponse)"></app-line-chart>
				</ng-container>
			</section>
		</ng-template>
	</section>

	<section class="chat-zone">
		<app-report-chat [loading]="loading" (submitQuery)="enviarConsulta($event)"></app-report-chat>
	</section>
</div>
