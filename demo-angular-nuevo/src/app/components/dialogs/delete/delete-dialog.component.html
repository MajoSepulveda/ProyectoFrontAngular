<h2 mat-dialog-title class="font-bold text-lg">Eliminar</h2>

<mat-dialog-content>
  <div class="flex items-center gap-3 py-3">
    <mat-icon class="text-red-500 text-4xl w-10 h-10">warning</mat-icon>
    <p class="text-gray-700">
      ¿Estás seguro de que deseas eliminar
      <strong>"{{ dialogData.itemName }}"</strong>?
      Esta acción no se puede deshacer.
    </p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="gap-2">
  <button mat-stroked-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="warn" (click)="confirm()">Confirmar</button>
</mat-dialog-actions>
