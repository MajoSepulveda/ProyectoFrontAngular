<h2 mat-dialog-title class="font-bold text-lg">{{ dialogData.title }}</h2>

<mat-dialog-content>
  <div class="flex flex-col gap-2 py-2 min-w-80">
    @for (entry of entries; track entry.key) {
      <div class="flex gap-3 border-b pb-2">
        <span class="text-xs font-semibold text-gray-500 uppercase w-40 shrink-0">
          {{ entry.key }}
        </span>
        <span class="text-sm text-gray-800 break-all">
          {{ entry.value }}
        </span>
      </div>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button (click)="close()">Cerrar</button>
</mat-dialog-actions>
